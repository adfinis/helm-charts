apiVersion: v2
name: security-apps
description: Argo CD app-of-apps config for security applications
type: application
version: 0.121.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/security-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        chore: bump oauth2-proxy from 10.4.3 to 10.6.0
      links:
        - name: oauth2-proxy helm chart 10.6.0 release
          url: https://github.com/oauth2-proxy/manifests/releases/tag/oauth2-proxy-10.6.0
        - name: oauth2-proxy helm chart 10.5.0 release
          url: https://github.com/oauth2-proxy/manifests/releases/tag/oauth2-proxy-10.5.0
