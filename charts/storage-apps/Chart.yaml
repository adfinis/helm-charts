apiVersion: v2
name: storage-apps
description: Argo CD app-of-apps config for storage applications
type: application
version: 0.23.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/storage-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        Updated cephCsiRbd and cephCsiCephfs to 3.17.0, including:
          * Recommend Operator deployment over standalone Helm charts; updated sidecars.
          * Added volume access restrictions via Kubernetes ServiceAccount.
          * Added publish secret caching and compressed IPv6 support.
          * Added configurable block encryption and new QoS limits.
          * Fixed replication promote/demote errors and improved volume fencing.
          * Added block usage stats; fixed panic during static volume expansion.
          * Added required RBAC for `VolumeGroupReplication`.
          * Added `SetSubVolCSIMetadata` to track metadata directly on subvolumes.
          * Fixed alternate filesystem mount failures and snapshot delete lock-ups.
      links:
        - name: "CephCsi v3.17.0 Release Notes"
          url: "https://github.com/ceph/ceph-csi/releases/tag/v3.17.0"
        - name: "Migration Guide"
          url: "https://github.com/ceph/ceph-csi-operator/blob/main/docs/migration.md"
