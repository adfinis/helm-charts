apiVersion: v2
name: logging-apps
description: Argo CD app-of-apps config for logging applications
type: application
version: 0.46.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/logging-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        Update loki from 3.6.7 to 3.7.1
        BREAKING CHANGES
        parsed labels should not override structured metadata (#19991)
        HELM
        [loki] Add liveness probe for sidecar and loki + IPv6 support for memberlist + GRPC optimized defaults. by @jkroepke in #346
        [loki] Set deploymentMode to Monolithic by @jkroepke in #258
        [loki] Add Gateway API HTTPRoute support by @QuentinBisson in #320
        [loki] Add seccompProfile: RuntimeDefault to sidecar securityContext by @QuentinBisson in #312
        [loki] Allow dedicated service accounts for each component. + use pod helper for canary. by @jkroepke in #285
        [loki] Add KEDA autoscaling support for all components by @DrFaust92 in #297
        [loki] Add seccompProfile and runAsNonRoot for restricted PSS by @marcofranssen in #275
        [loki] Add support for deploying the ui target in queryFrontend by @KyriosGN0 in #236
        [loki] Auto-inject GOMEMLIMIT from container memory limit by @DrFaust92 in #230
        [loki] add suffix to dashboard config maps by @jkroepke in #216
        Various dependency updates
        Various Bugfixes
