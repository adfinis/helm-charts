annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        Update meltallb chart from 0.15.2 to 0.15.3
        * Fix of vulnerability in docker images (CVE-2025-22874)
