        * add option to specify init container resources
        * dded readOnlyRootFilesystem: true and allowPrivilegeEscalation: false to containers missing these security flags, enhancing container security posture without affecting functionality.
      links:
        - name: metallb 0.15.3 release
          url: https://metallb.universe.tf/release-notes/#version-0-15-3
