apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.268.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: Update Argo CD from v3.2.6 to v3.3.9 and argo-cd Helm chart to 9.5.11

        v3.3.0 highlights:
        - server-side diffs
        - PreDelete hooks support
        - prune resources in reverse sync-wave order
        - namespace/CRD creation before PreSync phase
        - OIDC background token refresh
        - shallow clone support
        - Redis secrets via volume mount
        - GitHub App auth without installationId
        - custom icons in UI
        - KEDA ScaledJob health checks
        Helm chart improvements:
        - VPA support for all components (9.5.0)
        - ServerSideApply enabled for ArgoCD CRDs by default (9.4.12)
        - HTTPRoute support for ApplicationSet webhook (9.5.6)
        - HTTPRoute timeout configuration (9.4.5)
        - GRPCRoute/HTTPRoute empty matches support (9.5.8)
        - PrometheusRule API version overridable (9.5.7)
        - custom StatefulSet labels (9.4.6)
        - timeout.reconciliation aligned to 120s with 60s jitter (9.4.7)
        - dex bumped to v2.45.1
        - redis_exporter bumped to v1.83.0
        - argocd-extension-installer bumped to v1.0.0

