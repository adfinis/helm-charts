apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.271.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: Update Velero from v1.17.1 to v1.18.1

        - Update chart from v12.0.0 to v12.1.0
        - Add optional PodDisruptionBudget
        - Add missing standard Kubernetes labels
        - Remove bitnami deps
        - Process multiple backups concurrently
        - Lots of other features that were added upstream
      links:
        - name: Chart release
          url: https://github.com/vmware-tanzu/helm-charts/releases/tag/velero-12.1.0
        - name: Velero v1.18.1
          url: https://github.com/velero-io/velero/releases/tag/v1.18.1
        - name: Velero v1.18.0
          url: https://github.com/velero-io/velero/releases/tag/v1.18.0
