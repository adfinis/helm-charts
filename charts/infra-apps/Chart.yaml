apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.269.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: Update Argo CD from v3.3.9 o v3.4.4 and argo-cd Helm chart from 9.5.11 to 10.1.0

        v3.4 highlights:
        - Microsoft Teams Workflows Support
        - Application List Filter Improvements
        - Source Hydrator UI Improvements
        - Pause Reconciliation for a Cluster
        - Reduced DNS Noise from gRPC Health Checks
        - Extended OpenTelemetry Tracing for Authentication
        - ApplicationSet Cache Synchronization
        - Glob Patterns in Values Files
        - New Session Tokens CLI command
        - Expanded Manifest Generation Git Paths
        - Bug Fixes
        Helm chart improvements:
        - Update Redis
        - Enable network policies for all components by default
        - Add starupProbes
        - GatewayAPI ListenerSet Support
        - Other updates

      links:
        - name: Argo CD 3.4 upgrading
          url: https://argo-cd.readthedocs.io/en/stable/operator-manual/upgrading/3.3-3.4/
        - name: Argo CD v3.4 release candidate announcement
          url: https://blog.argoproj.io/argo-cd-v3-4-release-candidate-2702b8af68d4
        - name: Argo CD v3.4.0
          url: https://github.com/argoproj/argo-cd/releases/tag/v3.4.0
        - name: Argo CD v3.4.1
          url: https://github.com/argoproj/argo-cd/releases/tag/v3.4.1
        - name: Argo CD v3.4.2
          url: https://github.com/argoproj/argo-cd/releases/tag/v3.4.2
        - name: Argo CD v3.4.3
          url: https://github.com/argoproj/argo-cd/releases/tag/v3.4.3
        - name: Argo CD v3.4.4
          url: https://github.com/argoproj/argo-cd/releases/tag/v3.4.4
