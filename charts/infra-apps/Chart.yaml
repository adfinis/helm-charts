apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.270.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: Update cert-manager from 1.20.2 to 1.20.3

        - This patch release fixes a security issue (GHSA-8rvj-mm4h-c258, HIGH)
        - Remove issuer owner reference from challenges blocking challenge garbage collection
        - Bump go to 1.26.3, other deps to fix several govulncheck
        - Update Go to v1.26.4 to fix CVE-2026-27145, CVE-2026-42504, and CVE-2026-42507
      links:
        - name: cert-manager release notes
          url: https://github.com/cert-manager/cert-manager/releases/tag/v1.20.3
