  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: update velero chart from 11.3.2 to 12.0.0
        [velero] Remove bitnami nicely by inverting the original idea by @albundy83 in #706
        [velero] chore: update velero image reference by @HujinoKun in #721
        feat: update velero from 1.17.1 to 1.18.0
        BREAKING: According to Velero deprecation policy, PVC selected node feature is deprecated in v1.18. Velero could appropriately handle PVC's selected-node annotation, so users don't need to do anything particularly.
        Concurrent backup
        Cache volume for data movers
        Incremental size for data movers
        Wildcard support for namespaces
        VolumePolicy for PVC phase

      links:
        - name: velero-chart 11.4.0
          url: https://github.com/vmware-tanzu/helm-charts/releases/tag/velero-11.4.0
        - name: velero-chart 12.0.0
          url: https://github.com/vmware-tanzu/helm-charts/releases/tag/velero-12.0.0
        - name: velero 1.18.0
          url: https://github.com/velero-io/velero/releases/tag/v1.18.0
