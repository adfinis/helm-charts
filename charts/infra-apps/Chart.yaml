apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.264.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        Update ingress-nginx to 4.15.1 and marking it as deprecated
        * updated to controller-v1.15.1
        * updated dependencies
      links:
        - name: ingress nginx deprecation notice
          url: https://kubernetes.io/blog/2026/01/29/ingress-nginx-statement/
        - name: controller 1.15.1
          url: https://github.com/kubernetes/ingress-nginx/releases/tag/controller-v1.15.1
        - name: helm chart 1.15.1
          url: https://github.com/kubernetes/ingress-nginx/releases/tag/helm-chart-4.15.1
