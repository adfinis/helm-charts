apiVersion: v2
name: infra-apps
description: Argo CD app-of-apps config for infrastructure components
type: application
version: 0.262.0
home: https://github.com/adfinis/helm-charts/tree/main/charts/infra-apps
sources:
  - https://github.com/adfinis/helm-charts
maintainers:
  - name: adfinis
    email: support@adfinis.com
    url: https://adfinis.com
dependencies:
  - name: argoconfig
    version: 0.9.1
    repository: https://charts.adfinis.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: |
        feat: Update cert-manager from 1.19.2 to 1.19.4

        * fix vulnerabilities in dependencies
        * fix a reissuance loop when an issuer returns a certificate with a public key that doesn't match the CSR
        * fix HTTP-01 challenges failed when the Host header contained an IPv6 address
      links:
        - name: cert-manager 1.19.4
          url: https://github.com/cert-manager/cert-manager/releases/tag/v1.19.4
        - name: cert-manager 1.19.3
          url: https://github.com/cert-manager/cert-manager/releases/tag/v1.19.3
